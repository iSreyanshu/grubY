name: Build TDLib

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone TDLib
        shell: bash
        run: |
          git clone --depth=1 https://github.com/tdlib/td.git td

      - name: Setup Linux deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ zlib1g-dev libssl-dev gperf

      - name: Setup macOS deps
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew update
          brew install cmake openssl gperf

      - name: Setup Windows deps
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          choco install strawberryperl -y
          choco install gperf -y

      - name: Setup vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone --depth=1 https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          C:\vcpkg\vcpkg.exe install zlib:x64-windows

      - name: Configure TDLib (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -S td -B td/build -DCMAKE_BUILD_TYPE=Release -DTD_ENABLE_DOTNET=OFF

      - name: Configure TDLib (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $gperf = (Get-Command gperf -ErrorAction SilentlyContinue).Source
          if (-not $gperf) {
            throw "gperf not found on PATH after install"
          }
          cmake -S td -B td/build -DTD_ENABLE_DOTNET=OFF -DGPERF_EXECUTABLE="$gperf" -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build TDLib
        shell: bash
        run: |
          cmake --build td/build --config Release --parallel

      - name: Upload TDLib artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tdlib-${{ matrix.os }}
          path: |
            td/build/libtdjson.*
            td/build/Release/tdjson.dll
            td/build/Release/tdjson.lib
          if-no-files-found: warn
