name: Build TDLib

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

concurrency:
  group: build-tdlib-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clone TDLib
        shell: bash
        run: |
          git clone --depth=1 https://github.com/tdlib/td.git td
          echo "TDLIB_COMMIT=$(git -C td rev-parse HEAD)" >> "$GITHUB_ENV"
          VERSION=$(grep -Eo "project\\(TDLib VERSION [0-9.]+" td/CMakeLists.txt | awk '{print $3}')
          echo "TDLIB_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Setup Linux deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ zlib1g-dev libssl-dev gperf ninja-build

      - name: Setup macOS deps
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew update
          brew install cmake openssl gperf ninja

      - name: Setup Windows deps
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install strawberryperl -y
          choco install gperf -y

      - name: Setup vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone --depth=1 https://github.com/microsoft/vcpkg.git $env:RUNNER_TEMP\vcpkg
          & $env:RUNNER_TEMP\vcpkg\bootstrap-vcpkg.bat
          & $env:RUNNER_TEMP\vcpkg\vcpkg.exe install zlib:x64-windows
          "VCPKG_ROOT=$env:RUNNER_TEMP\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure TDLib (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -S td -B td/build -G Ninja -DCMAKE_BUILD_TYPE=Release -DTD_ENABLE_DOTNET=OFF

      - name: Configure TDLib (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $gperf = (Get-Command gperf -ErrorAction SilentlyContinue).Source
          if (-not $gperf) {
            throw "gperf not found on PATH after install"
          }
          cmake -S td -B td/build -DTD_ENABLE_DOTNET=OFF -DGPERF_EXECUTABLE="$gperf" -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build TDLib
        shell: bash
        run: |
          cmake --build td/build --config Release --parallel 2

      - name: Setup Ruby
        if: runner.os == 'Linux'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Generate tdlib.json
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ruby scripts/generate-tdlib-json.rb \
            --src td/td/generate/scheme/td_api.tl \
            --version "${TDLIB_VERSION}" \
            --commit "${TDLIB_COMMIT}" \
            --out tdlib.json

      - name: Upload TDLib artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tdlib-${{ matrix.os }}
          path: |
            td/build/libtdjson.*
            td/build/Release/tdjson.dll
            td/build/Release/tdjson.lib
            tdlib.json
          if-no-files-found: warn
