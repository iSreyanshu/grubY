name: Scheduled Check

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Run smoke check
        run: bundle exec rake ci:smoke
